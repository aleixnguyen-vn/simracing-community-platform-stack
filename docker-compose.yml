services:
  simracing_wp:
    image: wordpress:7.0-php8.4-fpm
    container_name: simracing_wp
    networks:
      - wp_backend
      - wp_frontend
    volumes:
      - wp_core:/var/www/html
      - ./conf/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
      - ./conf/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    environment:
      - WORDPRESS_CONFIG_EXTRA=define('WP_REDIS_HOST', 'object_cache');
      - WORDPRESS_DB_HOST=db_app
      - WORDPRESS_DB_USER=${WP_DB_USER}
      - WORDPRESS_DB_PASSWORD=${WP_DB_PASSWORD}
      - WORDPRESS_DB_NAME=${WP_DB_NAME}
      - WORDPRESS_TABLE_PREFIX=dsd2sdp_
    restart: always
    depends_on:
      db_app:
        condition: service_healthy
      object_cache:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m" #10mb in size
        max-file: "3"  #max 3 log files

  db_app:
    image: mariadb:11.4
    container_name: db_app
    volumes:
      - db:/var/lib/mysql
    networks:
      - wp_backend
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MARIADB_DATABASE=${WP_DB_NAME}
      - MARIADB_USER=${WP_DB_USER}
      - MARIADB_PASSWORD=${WP_DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "${WP_DB_USER}", "-p${WP_DB_PASSWORD}"]
      retries: 5
      interval: 5s
      timeout: 10s
    deploy:
      resources:
        limits:
          memory: 1G #max 1GB memory usage for DB cache

  nginx_proxy:
    image: nginx:1.29-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - wp_backend
      - wp_frontend
    restart: unless-stopped
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf
      - wp_core:/var/www/html
      - /app/project-1d/cf_certs:/etc/nginx/certs:ro # switch to Cloudflare SSL instead of Certbot

  object_cache:
    image: redis:8.4-alpine
    container_name: redis_cache
    volumes:
      - ./conf/redis.conf:/etc/redis/redis.conf
    networks:
      - wp_backend


networks:
  wp_frontend:
  wp_backend:
    internal: true

volumes:
  db:
  wp_core: