; Core Resource Limits
memory_limit = 512M
upload_max_filesize = 256M
post_max_size = 256M
max_execution_time = 3600s
max_input_time = 3600s

; Opcache High Performance Tuning
opcache.enable = 1
opcache.memory_consumption = 128   ; Consumes 128MB from your 4GB RAM
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 2         ; Checks for code changes every 2 seconds
opcache.fast_shutdown = 1