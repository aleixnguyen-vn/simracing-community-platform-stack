user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global upload size limit to prevent 413 error
    client_max_body_size 256M;

    # FastCGI Cache engine definitions
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m max_size=1g;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale error timeout invalid_header http_500;
    server_tokens off;

    # STAGE 1: HTTP Server - Redirects to HTTPS and serves ACME Challenges
    server {
        listen 80;
        server_name staging.aleix-simracing.me; # Update your domain here

        # Let's Encrypt ACME verification path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Global HTTP to HTTPS redirection
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # STAGE 2: HTTPS Server - Core Reverse Proxy and FastCGI Cache termination
    server {
        listen 443 ssl;
        server_name staging.aleix-simracing.me; # Update your domain here

        root /var/www/html;
        index index.php;

        # SSL Certificates Paths (Points to shared Certbot volume)
        ssl_certificate /etc/letsencrypt/live/staging.aleix-simracing.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.aleix-simracing.me/privkey.pem;

        # Production Grade SSL Protocols and Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Cache bypass and dynamic route logic configurations
        set $skip_cache 0;

        # POST requests must always hit the backend database
        if ($request_method = POST) {
            set $skip_cache 1;
        }

        # URLs with query strings should remain dynamic
        if ($query_string != "") {
            set $skip_cache 1;
        }

        # Do not cache internal WordPress routes and system endpoints
        if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
            set $skip_cache 1;
        }

        # Bypass cache layers for authenticated users or active commenters
        if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
            set $skip_cache 1;
        }


        # Route dynamic PHP scripts to upstream FPM worker
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass simracing_wp:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # FastCGI Cache engine implementation
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 301 302 1h;
            
            # Conditional bypass directives utilizing defined upstream checks
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;

            # Overriding upstream software cookies (e.g., wpDiscuz nonces) for guest layers
            fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
            fastcgi_hide_header Set-Cookie; 
            
            # Upstream state tracking header for debugging
            add_header X-FastCGI-Cache $upstream_cache_status;
        }

        # Cache and bypass asset layers directly
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
            expires max;
            log_not_found off;
        }
    }
}