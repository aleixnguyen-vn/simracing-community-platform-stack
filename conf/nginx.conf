user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global upload size limit to prevent 413 Payload Too Large error
    client_max_body_size 256M;
    server_tokens off;

    # Dynamic Gzip Compression Profiles
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.0;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss image/svg+xml;

    # FastCGI Cache Storage and Micro-caching Engines
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m max_size=1g;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    
    # Allow serving stale cache elements during backend application processing or failures
    fastcgi_cache_use_stale error timeout invalid_header updating http_500;

    # --- ADVANCED COOKIE CONTROL MECHANISM ---
    # Dynamically determine if the Set-Cookie header should be stripped or preserved.
    # If $skip_cache is 1 (Admin / Login / POST), we preserve cookies by mapping to an empty string.
    # If $skip_cache is 0 (Guest), we enforce cookie stripping to maximize FastCGI cache HIT rates.
    map $skip_cache $hide_cookie_header {
        1       "";
        0       "Set-Cookie";
    }

    # STAGE 1: HTTP Server - SSL Bootstrap & Redirection Handling
    server {
        listen 80;
        server_name aleix-simracing.me;

        # Global HTTP to HTTPS redirection
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # STAGE 2: HTTPS Server - Monitored Gateway & Proxy Termination
    server {
        listen 443 ssl;
        server_name aleix-simracing.me;

        root /var/www/html;
        index index.php;

        # SSL Certificates Paths (Points to shared SSL volume)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Production Grade SSL Protocols and Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Real IP configuration for Cloudflare Proxy Layer
        real_ip_header CF-Connecting-IP;
        set_real_ip_from 0.0.0.0/0;

        # Strict Cache Exemption Mapping (Defaults to 0 - Cache Everything)
        set $skip_cache 0;

        # POST requests must always bypass the cache layer
        if ($request_method = POST) {
            set $skip_cache 1;
        }

        # URLs with active query strings should remain dynamic
        if ($query_string != "") {
            set $skip_cache 1;
        }

        # Do not cache internal WordPress system management routes or authentication targets
        if ($request_uri ~* "/wp-admin/|/wp-json/|/wp-login\.php|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
            set $skip_cache 1;
        }

        # Bypass cache layers for authenticated backend users or active core commenters
        if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
            set $skip_cache 1;
        }

        # Handle WordPress Pretty Permalinks Framework
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # Native FastCGI Application Pipeline Execution Loop (Unified Pipeline)
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # Upstream configuration targeting the internal WordPress FPM container
            fastcgi_pass simracing_wp:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Boundary Resource Timers to prevent 504 Gateway Timeouts during heavy queries
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;

            # Core Cache Binding Architecture
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 301 302 1h;

            # Enforce dynamic conditional cache control policies
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            
            # Prevent Nginx from caching lock-outs caused by application-level dynamic headers
            fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
            
            # Mitigate database stampedes during background cache updates
            fastcgi_cache_lock on;
            fastcgi_cache_lock_timeout 5s;
            
            # Dynamically hide or preserve authentication cookies via the verified map block above
            fastcgi_hide_header $hide_cookie_header;

            # Real-time Telemetry Tracking Header for system monitoring and benchmarking
            add_header X-FastCGI-Cache $upstream_cache_status;
        }

        # Static Asset Layer Interception
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
            expires max;
            log_not_found off;
            access_log off;
        }
    }
}
