user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global upload size limit to prevent 413 error
    client_max_body_size 256M;

    # FastCGI Cache engine definitions
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale error timeout invalid_header http_500;

    # STAGE 1: HTTP Server - Redirects to HTTPS and serves ACME Challenges
    server {
        listen 80;
        server_name staging.aleix-simracing.me; # Update your domain here

        # Let's Encrypt ACME verification path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Global HTTP to HTTPS redirection
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # STAGE 2: HTTPS Server - Core Reverse Proxy and FastCGI Cache termination
    server {
        listen 443 ssl;
        server_name staging.aleix-simracing.me; # Update your domain here

        root /var/www/html;
        index index.php;

        # SSL Certificates Paths (Points to shared Certbot volume)
        ssl_certificate /etc/letsencrypt/live/staging.aleix-simracing.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.aleix-simracing.me/privkey.pem;

        # Production Grade SSL Protocols and Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Handle WordPress pretty permalinks
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # Route dynamic PHP scripts to upstream FPM worker
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass simracing_wp:9000; # Target your exact compose service name
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # FastCGI Cache activation
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 301 302 1h;
        }

        # Cache and bypass asset layers directly
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
            expires max;
            log_not_found off;
        }
    }
}