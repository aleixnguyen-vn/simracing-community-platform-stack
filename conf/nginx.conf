user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global upload size limit to prevent 413 Payload Too Large error
    client_max_body_size 256M;
    server_tokens off;

    # Dynamic Gzip Compression Profiles
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.0;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss image/svg+xml;

    # STAGE 1: HTTP Server - SSL Bootstrap & Redirection Handling
    server {
        listen 80;
        server_name domain.me;

        # Global HTTP to HTTPS redirection
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # STAGE 2: HTTPS Server - Monitored Gateway & Proxy Termination
    server {
        listen 443 ssl;
        server_name domain.me;

        root /var/www/html;
        index index.php;

        # SSL Certificates Paths (Points to shared SSL volume)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Production Grade SSL Protocols and Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Real IP configuration for Cloudflare Proxy Layer
        real_ip_header CF-Connecting-IP;
        set_real_ip_from 0.0.0.0/0;

        # Handle WordPress Pretty Permalinks Framework
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # Native FastCGI Application Pipeline Execution Loop (Unified Pipeline)
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            
            # Upstream configuration targeting the internal WordPress FPM container
            fastcgi_pass simracing_wp:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Boundary Resource Timers to prevent 504 Gateway Timeouts during heavy queries
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;
        }

        # Static Asset Layer Interception
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
            expires max;
            log_not_found off;
            access_log off;
        }
    }
}
