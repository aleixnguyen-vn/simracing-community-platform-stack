user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Global upload size limit to prevent 413 error
    client_max_body_size 256M;
    server_tokens off;

    # Dynamic Gzip Compression Profiles
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss image/svg+xml;

    # FastCGI Cache Storage and Micro-caching Engines
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=WORDPRESS:100m inactive=60m max_size=1g;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale error timeout invalid_header updating http_500;

    # STAGE 1: HTTP Server - SSL Bootstrap & Redirection Handling
    server {
        listen 80;
        server_name aleix-simracing.me;

        # Global HTTP to HTTPS redirection
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # STAGE 2: HTTPS Server - Monitored Gateway & Proxy Termination
    server {
        listen 443 ssl;
        server_name aleix-simracing.me;

        root /var/www/html;
        index index.php;

        # SSL Certificates Paths (Points to shared Certbot volume)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Production Grade SSL Protocols and Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Real IP configuration for Cloudflare Proxy
        real_ip_header CF-Connecting-IP;
        set_real_ip_from 0.0.0.0/0; # Trust Cloudflare proxy headers global interface

        # Strict Cache Exemption Mapping (Defaults to 0 - Cache Everything)
        set $skip_cache 0;

        # POST requests must always hit the backend database
        if ($request_method = POST) {
            set $skip_cache 1;
        }

        # URLs with query strings should remain dynamic
        if ($query_string != "") {
            set $skip_cache 1;
        }

        # Do not cache internal WordPress routes and system endpoints
        if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
            set $skip_cache 1;
        }

        # Bypass cache layers for authenticated users or active commenters
        if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_no_cache|wordpress_logged_in") {
            set $skip_cache 1;
        }

        # Handle WordPress Pretty Permalinks Framework
        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        # --- OPTIMIZATION: Dedicated Pipeline for WordPress Core & Admin Routing ---
        # This completely isolates login/admin pipelines to prevent cookie stripping bugs
        location ~* /(wp-admin/|wp-login\.php|xmlrpc\.php|wp-.*\.php) {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass simracing_wp:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Completely bypass any caching logic for core files
            fastcgi_cache_bypass 1;
            fastcgi_no_cache 1;

            # Keep system session timers stable
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;

            # Explicitly clear tracking header status for clean upstream bypass logs
            add_header X-FastCGI-Cache "BYPASS-CORE";
        }

        # Native FastCGI Application Pipeline Execution Loop (Main Guest Layer)
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass simracing_wp:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Core Cache Binding Architecture
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 301 302 1h;

            # Enforce Cache Control Policies and Ignore Dynamic App Headers
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            
            # Extracted 'Vary' to allow proper cache hit generation under compression
            fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
            
            # Strip application-level cookies (wpDiscuz nonces) for guest layers
            fastcgi_hide_header Set-Cookie;

            # Boundary Resource Timers
            fastcgi_read_timeout 300s;
            fastcgi_send_timeout 300s;

            # Real-time Telemetry Tracking Header
            add_header X-FastCGI-Cache $upstream_cache_status;
        }

        # Static Asset Layer Interception
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|eot)$ {
            expires max;
            log_not_found off;
        }
    }
}
