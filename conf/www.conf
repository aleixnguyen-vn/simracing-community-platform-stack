[www]
user = www-data
group = www-data
listen = 9000

pm = dynamic
pm.max_children = 20       ; Maximum active workers (20 * 100MB = ~2GB RAM limit)
pm.start_servers = 5       ; Number of workers spawned on startup
pm.min_spare_servers = 4   ; Minimum idle workers kept alive for sudden traffic bursts
pm.max_spare_servers = 8   ; Maximum idle workers allowed to sit active
pm.max_requests = 1000     ; Respawn workers after 1000 requests to mitigate memory leaks

request_terminate_timeout = 300s
catch_workers_output = yes
